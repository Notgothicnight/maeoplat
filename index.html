<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mae-plat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d12;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    .game-wrapper {
      border: 3px solid #2a2a3a;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(100, 200, 255, 0.15), inset 0 0 80px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      background: #12121a;
    }

    h1 {
      color: #64c8ff;
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      padding: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .controls {
      color: #6b6b80;
      font-size: 0.7rem;
      text-align: center;
      padding: 0 12px 12px;
      letter-spacing: 0.1em;
    }

    .controls kbd {
      display: inline-block;
      padding: 2px 6px;
      background: #1e1e2a;
      border: 1px solid #3a3a4a;
      border-radius: 4px;
      color: #64c8ff;
      margin: 0 2px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13, 13, 18, 0.92);
      padding: 24px;
    }

    .overlay.hidden {
      display: none;
    }

    .menu-title {
      color: #64c8ff;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .menu-sub {
      color: #6b6b80;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      margin-bottom: 40px;
    }

    .btn {
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      padding: 14px 32px;
      margin: 8px;
      border: 2px solid #2a3a4a;
      border-radius: 8px;
      background: #1e1e2a;
      color: #64c8ff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .btn:hover {
      background: #252535;
      border-color: #3a4a5a;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      max-width: 520px;
      max-height: 380px;
      overflow-y: auto;
      margin: 24px 0;
      padding-right: 8px;
    }

    .level-btn {
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      padding: 20px 16px;
      border: 2px solid #2a3a4a;
      border-radius: 8px;
      background: #1e1e2a;
      color: #8ab4d4;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .level-btn:hover {
      background: #252535;
      border-color: #64c8ff;
      color: #64c8ff;
      transform: translateY(-2px);
    }

    .level-btn .level-num {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: #64c8ff;
      margin-bottom: 4px;
    }

    .back-row {
      margin-top: 20px;
    }

    .game-wrapper {
      position: relative;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 0;
      flex-wrap: wrap;
      gap: 8px;
    }

    .header-row .controls { padding: 0; margin: 0; }

    .btn-small {
      font-family: inherit;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      background: #1e1e2a;
      color: #6b6b80;
      cursor: pointer;
    }

    .btn-small:hover { color: #64c8ff; border-color: #3a4a5a; }
  </style>
</head>

    function rectOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.width > b.x &&
             a.y < b.y + b.h && a.y + a.height > b.y;
    }

    function resolvePlatform(obj, plat) {
      const overlapLeft = (obj.x + obj.width) - plat.x;
      const overlapRight = (plat.x + plat.w) - obj.x;
      const overlapTop = (obj.y + obj.height) - plat.y;
      const overlapBottom = (plat.y + plat.h) - obj.y;

      const minX = Math.min(overlapLeft, overlapRight);
      const minY = Math.min(overlapTop, overlapBottom);

      if (minY < minX) {
        if (obj.vy > 0) {
          obj.y = plat.y - obj.height;
          obj.vy = 0;
          obj.onGround = true;
          obj.hasDoubleJumped = false;
        } else if (obj.vy < 0) {
          obj.y = plat.y + plat.h;
          obj.vy = 0;
        }
      } else {
        if (obj.vx > 0) {
          obj.x = plat.x - obj.width;
          obj.vx = 0;
        } else if (obj.vx < 0) {
          obj.x = plat.x + plat.w;
          obj.vx = 0;
        }
      }
    }

    function update() {
      // Input
      const accel = 0.5;
const friction = 0.8;

if (keys.a) player.vx -= accel;
if (keys.d) player.vx += accel;

player.vx *= friction;

if (player.vx > player.speed) player.vx = player.speed;
if (player.vx < -player.speed) player.vx = -player.speed;
      if ((keys.w || keys.space) && wPressedThisFrame) {
        if (player.onGround) {
          player.vy = -player.jumpForce;
          player.onGround = false;
        } else if (player.canDoubleJump && !player.hasDoubleJumped) {
          player.vy = -player.jumpForce * 0.88;
          player.hasDoubleJumped = true;
        }
      }
      wPressedThisFrame = false;

      player.onGround = false;
      player.x += player.vx;
      player.y += player.vy;
      player.vy += player.gravity;

      // Clamp vertical speed
      if (player.vy > 18) player.vy = 18;

      // Platform collisions
      for (const plat of platforms) {
        const prevY = player.y - player.vy;
        const prevX = player.x - player.vx;
        const box = { x: player.x, y: player.y, width: player.width, height: player.height };
        if (rectOverlap(box, plat)) {
          resolvePlatform(player, plat);
        }
      }

      // Fall off bottom → reset level
      if (player.y + player.height > canvas.height) {
        resetToLevelStart();
        return;
      }
      if (player.y < 0) {
        player.y = 0;
        player.vy = 0;
      }

      // Sides: level 5 (Skyline) only — going left wraps to end area; others reset
      if (player.x + player.width < 0) {
        if (currentLevelIndex === 4) {
          player.x = 722;
          player.y = 296;
          player.vx = 0;
          player.vy = 0;
        } else {
          resetToLevelStart();
          return;
        }
      }
      if (player.x > levelWidth) {
        if (currentLevelIndex === 4) {
          player.x = 0;
        } else {
          resetToLevelStart();
          return;
        }
      }

      // Camera follow
      const maxCam = Math.max(0, levelWidth - canvas.width);
      cameraX = player.x - canvas.width / 2 + player.width / 2;
      cameraX = Math.max(0, Math.min(maxCam, cameraX));

      // Reach end zone?
      if (endZone && rectOverlap(
        { x: player.x, y: player.y, width: player.width, height: player.height },
        endZone
      )) {
        levelCompleteTime = (performance.now() - levelStartTime) / 1000;
        gameRunning = false;
        levelCompleteOverlayVisible = true;
        document.getElementById('levelCompleteOverlay').classList.remove('hidden');
        document.getElementById('completeTime').textContent = levelCompleteTime.toFixed(2);
        document.getElementById('completeLevelName').textContent = LEVELS[currentLevelIndex].name;
      }
    }

    function draw() {
      // Background and grid in screen space (no camera) so they don't drag
      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, '#0f0f18');
      bg.addColorStop(0.6, '#12121a');
      bg.addColorStop(1, '#0a0a10');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(60, 80, 100, 0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i < canvas.width; i += 40) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j < canvas.height; j += 40) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(canvas.width, j);
        ctx.stroke();
      }

      // World (platforms, end, player) with camera
      ctx.save();
      ctx.translate(-cameraX, 0);

      // End zone (finish flag)
      if (endZone) {
        const ez = endZone;
        ctx.fillStyle = 'rgba(80, 220, 120, 0.35)';
        ctx.strokeStyle = 'rgba(80, 220, 120, 0.9)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(ez.x, ez.y, ez.w, ez.h, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#50dc78';
        ctx.font = 'bold 24px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('END', ez.x + ez.w / 2, ez.y + ez.h / 2);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
      }

      // Platforms
      for (const p of platforms) {
        const grad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y + p.h);
        grad.addColorStop(0, '#2a3a4a');
        grad.addColorStop(0.5, '#1e2a36');
        grad.addColorStop(1, '#253544');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(p.x, p.y, p.w, p.h, 6);
        ctx.fill();
        ctx.strokeStyle = 'rgba(100, 200, 255, 0.35)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Player
      const px = player.x + player.width / 2;
      const py = player.y + player.height / 2;
      const pg = ctx.createRadialGradient(px - 8, py - 10, 0, px, py, player.width);
      pg.addColorStop(0, '#64c8ff');
      pg.addColorStop(0.6, '#3a9fd9');
      pg.addColorStop(1, '#1e6a99');
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.roundRect(player.x, player.y, player.width, player.height, 8);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.restore();

      // Timer (screen space)
      if (gameRunning && levelStartTime > 0) {
        const elapsed = (performance.now() - levelStartTime) / 1000;
        ctx.fillStyle = 'rgba(100, 200, 255, 0.95)';
        ctx.font = 'bold 18px JetBrains Mono';
        ctx.textAlign = 'right';
        ctx.fillText(elapsed.toFixed(2) + ' s', canvas.width - 12, 24);
        ctx.textAlign = 'left';
      }
    }

    function resetToLevelStart() {
      const level = LEVELS[currentLevelIndex];
      if (!level) return;
      player.x = level.startX;
      player.y = level.startY;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.hasDoubleJumped = false;
      levelStartTime = performance.now();
    }

    function startGame(levelIndex) {
      const level = LEVELS[levelIndex];
      if (!level) return;
      currentLevelIndex = levelIndex;
      platforms = level.platforms.map(p => ({ ...p }));
      endZone = level.endZone ? { ...level.endZone } : null;
      levelWidth = level.levelWidth != null ? level.levelWidth : 800;
      cameraX = 0;
      levelStartTime = performance.now();
      levelCompleteOverlayVisible = false;
      document.getElementById('levelCompleteOverlay').classList.add('hidden');
      player.x = level.startX;
      player.y = level.startY;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.hasDoubleJumped = false;

      document.getElementById('startMenu').classList.add('hidden');
      document.getElementById('levelSelect').classList.add('hidden');
      document.getElementById('backToLevels').classList.remove('hidden');
      document.getElementById('escHint').classList.remove('hidden');
      gameRunning = true;
    }

    function showLevelSelect() {
      document.getElementById('startMenu').classList.add('hidden');
      document.getElementById('levelSelect').classList.remove('hidden');
      document.getElementById('backToLevels').classList.add('hidden');
      document.getElementById('escHint').classList.add('hidden');
      document.getElementById('levelCompleteOverlay').classList.add('hidden');
      gameRunning = false;
      levelCompleteOverlayVisible = false;
    }

    function showMenu() {
      document.getElementById('startMenu').classList.remove('hidden');
      document.getElementById('levelSelect').classList.add('hidden');
      document.getElementById('backToLevels').classList.add('hidden');
      document.getElementById('escHint').classList.add('hidden');
      document.getElementById('levelCompleteOverlay').classList.add('hidden');
      gameRunning = false;
      levelCompleteOverlayVisible = false;
    }

    function loop() {
      if (gameRunning) {
        update();
        draw();
      }
      requestAnimationFrame(loop);
    }

    // Menu / level select UI
    document.getElementById('btnSelectLevel').addEventListener('click', showLevelSelect);
    document.getElementById('btnBackMenu').addEventListener('click', showMenu);
    document.getElementById('backToLevels').addEventListener('click', showLevelSelect);
    document.getElementById('btnBackToLevels').addEventListener('click', showLevelSelect);

    const levelGrid = document.getElementById('levelGrid');
    LEVELS.forEach((level, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'level-btn';
      btn.innerHTML = `<span class="level-num">Level ${i + 1}</span>${level.name}`;
      btn.addEventListener('click', () => startGame(i));
      levelGrid.appendChild(btn);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && gameRunning) {
        showLevelSelect();
        e.preventDefault();
        return;
      }
      const k = e.key.toLowerCase();
      if (k === 'w' || k === 'arrowup') { keys.w = true; wPressedThisFrame = true; e.preventDefault(); }
      if (k === ' ') { keys.space = true; wPressedThisFrame = true; e.preventDefault(); }
      if (k === 'a' || k === 'arrowleft') { keys.a = true; e.preventDefault(); }
      if (k === 'd' || k === 'arrowright') { keys.d = true; e.preventDefault(); }
    });
    document.addEventListener('keyup', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w' || k === 'arrowup') keys.w = false;
      if (k === ' ') keys.space = false;
      if (k === 'a' || k === 'arrowleft') keys.a = false;
      if (k === 'd' || k === 'arrowright') keys.d = false;
    });

    loop();
  </script>
</body>
</html>
